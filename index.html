<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BEST TAROT READING — Free Readings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>BEST TAROT READING</h1>
    <p class="tagline">Colorful decks · See all cards · Free three-card readings</p>
  </header>

  <main class="container">
    <section id="decks" class="decks-grid" aria-live="polite">
      <!-- Deck cards injected by script -->
    </section>

    <aside id="reading-panel" class="reading-panel" aria-hidden="true">
      <button id="close-reading" class="close">✕</button>
      <h2>Your Reading</h2>
      <div id="reading-cards" class="reading-cards"></div>
      <div id="reading-meanings" class="reading-meanings"></div>
      <button id="new-reading" class="btn">Draw Again</button>
    </aside>
  </main>

  <footer class="site-footer">
    <p>Free readings for entertainment only.</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
